services:

  # ─────────────────────────────────────────
  #  Zookeeper
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # дозволяємо всі 4-літерні команди, включаючи ruok
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    ports:
      - "2181:2181"
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  # ─────────────────────────────────────────
  #  Broker 1
  # ─────────────────────────────────────────
  broker1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: broker1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  #  Broker 2
  # ─────────────────────────────────────────
  broker2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: broker2
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker2:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:29093 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  #  Kafka UI
  # ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      broker1:
        condition: service_healthy
      broker2:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker1:29092,broker2:29093
    networks:
      - kafka-net

  # ─────────────────────────────────────────
  #  Topic initializer (runs once, then exits)
  # ─────────────────────────────────────────
  topic-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: topic-init
    depends_on:
      broker1:
        condition: service_healthy
      broker2:
        condition: service_healthy
    networks:
      - kafka-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo 'Both brokers are healthy. Creating topics...'
        kafka-topics --create --if-not-exists --bootstrap-server broker1:29092 --topic Topic1 --partitions 3 --replication-factor 2
        kafka-topics --create --if-not-exists --bootstrap-server broker1:29092 --topic Topic2 --partitions 3 --replication-factor 2
        echo 'Done. Topics list:'
        kafka-topics --list --bootstrap-server broker1:29092

  # ─────────────────────────────────────────
  #  Java Producer
  # ─────────────────────────────────────────
  producer:
    build:
#      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    depends_on:
      topic-init:
        condition: service_completed_successfully
    volumes:
      - ./data/Divvy_Trips_2019_Q4.csv:/app/data/Divvy_Trips_2019_Q4.csv:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker1:29092,broker2:29093
      CSV_FILE_PATH: /lab3/data/Divvy_Trips_2019_Q4.csv
      TOPIC1: Topic1
      TOPIC2: Topic2
      SEND_DELAY_MS: 10
    networks:
      - kafka-net

networks:
  kafka-net:
    driver: bridge